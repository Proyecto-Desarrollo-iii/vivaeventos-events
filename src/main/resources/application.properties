
spring.application.name=vivaeventos-events
app.version=0.1.0
app.api.version=v1

server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/vivaeventos_events}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devdb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:a1b2c3d4}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw}
jwt.expiration=86400000

services.tickets.url=${SERVICES_TICKETS_URL:http://localhost:8085}
services.notifications.url=${SERVICES_NOTIFICATIONS_URL:http://localhost:8087}
services.audit.url=${SERVICES_AUDIT_URL:http://audit:8089}

management.server.port=8082
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=*

logging.level.root=ERROR
logging.level.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.jackson.serialization.indent-output=true